<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatPulse - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">ChatPulse</h1>
      
      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>

      <div id="error-message" class="error-message"></div>

      <form id="login-form" class="auth-form">
        <div class="form-group">
          <input type="email" id="login-email" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input type="password" id="login-password" placeholder="Password" required>
        </div>
        <button type="submit" class="auth-btn">Login</button>
      </form>

      <form id="register-form" class="auth-form hidden">
        <div class="form-group">
          <input type="text" id="register-username" placeholder="Username" required minlength="3">
        </div>
        <div class="form-group">
          <input type="email" id="register-email" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input type="password" id="register-password" placeholder="Password" required minlength="6">
        </div>
        <button type="submit" class="auth-btn">Register</button>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
